ip: "192.168.10.10"
memory: 2048
cpus: 2
provider: virtualbox
mariadb: true
backup: false

authorize: ~/.ssh/id_rsa.pub

keys:
- ~/.ssh/id_rsa

folders:
- map: ~/Sites/projects
  to: /home/vagrant/projects
  type: "nfs"
  options:
    mount_options: [ 'rw', 'vers=3', 'tcp', 'fsc' ,'actimeo=2' ]
#         linux__nfs_options: [ 'rw', 'no_subtree_check', 'all_squash', 'async' ]


