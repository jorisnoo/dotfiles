ip: "192.168.10.10"
memory: 2048
cpus: 1
provider: virtualbox
mariadb: true
backup: false

authorize: ~/.ssh/id_rsa.pub

keys:
    - ~/.ssh/id_rsa

folders:
    - map: ~/Code/y7k-projects
      to: /home/vagrant/y7k-projects
      type: "nfs"
      options:
         mount_options: [ 'rw', 'vers=3', 'tcp', 'fsc' ,'actimeo=2' ]
#         linux__nfs_options: [ 'rw', 'no_subtree_check', 'all_squash', 'async' ]


sites:

    - map: pj01.test
      to: /home/vagrant/y7k-projects/pj01/public
      php: "7.2"


databases:
    - homestead

