ip: "192.168.10.10"
memory: 2048
cpus: 1
provider: virtualbox
backup: false

authorize: ~/.ssh/id_rsa.pub

keys:
    - ~/.ssh/id_rsa

folders:
    - map: ~/Sites/projects
      to: /home/vagrant/projects
      type: "nfs"

sites:

    - map: pj01.test
      to: /home/vagrant/projects/pj01/public
      

databases:
    - homestead

